<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Peace — Interactive Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Real app stylesheet — so real renderers produce correctly styled output -->
  <link rel="stylesheet" href="/css/main.css" />

  <style>
    /* ============================================================
       Demo-specific overrides
       Concept pane layout, app pane containment, demo chrome
       ============================================================ */

    /* ── Demo Header ── */
    .demo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-5);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .demo-header__brand {
      font-size: var(--font-size-lg);
      font-weight: 700;
      color: var(--color-text-primary);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .demo-header__brand span { color: var(--color-accent); }

    /* ── Progress Dots ── */
    .demo-progress {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .demo-progress__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-border);
      transition: background var(--transition-mid), transform var(--transition-mid);
    }
    .demo-progress__dot.is-active {
      background: var(--color-accent);
      transform: scale(1.25);
    }
    .demo-progress__dot.is-completed {
      background: var(--color-accent-light);
    }

    /* ── Demo Stage (dual-pane container) ── */
    .demo-stage {
      display: flex;
      gap: var(--space-8);
      align-items: flex-start;
      max-width: 1080px;
      margin: 0 auto;
      padding: var(--space-8) var(--space-5) var(--space-12);
      min-height: calc(100dvh - 57px);
    }
    .demo-stage.is-single {
      justify-content: center;
    }
    .demo-stage.is-single #demo-concept {
      max-width: 520px;
      flex: none;
      width: 100%;
    }
    @media (max-width: 768px) {
      .demo-stage {
        flex-direction: column;
        gap: var(--space-5);
      }
    }

    /* ── Concept Pane (left / top on mobile) ── */
    #demo-concept {
      flex: 1;
      min-width: 0;
    }

    /* ── Step Transitions ── */
    .demo-step {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .demo-step.is-active {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── App Pane (right / bottom on mobile) ── */
    .demo-app-shell {
      flex: 1;
      min-width: 0;
      position: relative;
      overflow: hidden;
      height: 640px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      box-shadow: var(--shadow-sm);
      pointer-events: none;
      transition: height 0.3s ease;
    }
    @media (max-width: 768px) {
      .demo-app-shell { height: 520px; }
    }
    .demo-app-shell.is-hidden { display: none; }

    /* Override fixed positioning to absolute within app pane */
    .demo-app-shell .top-bar {
      position: absolute !important;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex !important;
    }
    .demo-app-shell .top-bar__hamburger,
    .demo-app-shell .top-bar__tt-inline,
    .demo-app-shell .top-bar__action,
    .demo-app-shell .top-bar__nav { display: none !important; }

    .demo-app-shell #main-content {
      position: absolute !important;
      top: 56px;
      bottom: 0;
      left: 0; right: 0;
      overflow-y: auto;
      padding-bottom: 0 !important;
      transition: opacity 0.25s ease;
    }
    /* When bottom nav is visible, reserve space for it */
    .demo-app-shell.show-nav #main-content {
      bottom: 56px;
    }
    .demo-app-shell #main-content.is-transitioning {
      opacity: 0;
    }

    /* Force home-page 3-col grid into single-column inside narrow demo pane.
       Without this, media queries check viewport width (wide) not container
       width, so the 3-col grid renders in ~450px causing sections to sit
       side-by-side instead of stacking vertically — making scroll useless. */
    .demo-app-shell .home-page {
      display: block !important;
      padding: var(--space-4) var(--space-4) 0 !important;
    }
    .demo-app-shell .home-page .dash-section {
      margin-top: var(--space-4);
    }
    .demo-app-shell .home-page .rail-title {
      display: block;
    }
    .demo-app-shell .home-card--side {
      padding: var(--space-3) var(--space-4);
    }
    .demo-app-shell .home-card--side .card-header {
      display: block !important;
    }
    /* Hide Notes bar in demo — reduces clutter, keeps focus on taught sections */
    .demo-app-shell .notes-card {
      display: none !important;
    }

    /* Step 4: isolate Financial Health section so it's fully visible */
    .demo-app-shell.health-focus .home-welcome,
    .demo-app-shell.health-focus .home-mode-switch,
    .demo-app-shell.health-focus .home-section-period,
    .demo-app-shell.health-focus .home-section-structure,
    .demo-app-shell.health-focus .home-section-bills {
      display: none !important;
    }

    /* Hide bottom nav by default — only show during nav tour and sandbox */
    .demo-app-shell .bottom-nav {
      position: absolute !important;
      bottom: 0; left: 0; right: 0;
      transform: none !important;
      max-width: none !important;
      justify-content: center !important;
      display: none !important;
    }
    .demo-app-shell.show-nav .bottom-nav {
      display: flex !important;
    }

    .demo-app-shell .fab {
      position: absolute !important;
      bottom: 68px; right: 16px;
      z-index: 15;
    }

    /* App pane label */
    .demo-app-label {
      font-size: var(--font-size-xs);
      color: var(--color-text-secondary);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-3);
    }

    /* ── Demo Highlight (pulse outline on focused section) ── */
    .demo-highlight {
      outline: 2px solid var(--color-accent);
      outline-offset: 4px;
      border-radius: 8px;
      animation: demo-pulse 1.5s ease-in-out 2;
    }
    @keyframes demo-pulse {
      0%, 100% { outline-color: var(--color-accent); }
      50% { outline-color: transparent; }
    }

    /* ── FAB pulse (Step 2) ── */
    .demo-fab-pulse {
      pointer-events: none;
      animation: demo-fab-glow 1.2s ease-in-out infinite !important;
    }
    @keyframes demo-fab-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74,124,89,0.4); }
      50% { box-shadow: 0 0 0 12px rgba(74,124,89,0); }
    }

    /* ── Expense sheet preview (Step 2 overlay) ── */
    .demo-sheet-preview {
      position: absolute;
      bottom: 56px;
      left: 0; right: 0;
      background: var(--color-surface);
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
      padding: var(--space-3) var(--space-4) var(--space-4);
      z-index: 20;
      animation: demo-sheet-up 0.4s ease-out;
    }
    @keyframes demo-sheet-up {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .demo-sheet-preview__handle {
      width: 32px;
      height: 3px;
      background: var(--color-border);
      border-radius: 2px;
      margin: 0 auto var(--space-3);
    }
    .demo-sheet-preview__title {
      font-size: var(--font-size-sm);
      font-weight: 600;
      margin-bottom: var(--space-3);
    }
    .demo-sheet-preview__field {
      height: 32px;
      background: var(--color-surface-alt);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-2);
      display: flex;
      align-items: center;
      padding: 0 var(--space-3);
      font-size: var(--font-size-xs);
      color: var(--color-text-secondary);
    }
    .demo-sheet-preview__btn {
      height: 36px;
      background: var(--color-accent);
      border-radius: var(--radius-sm);
      margin-top: var(--space-2);
    }

    /* ── Concept Pane Typography ── */
    .demo-logo {
      font-size: var(--font-size-xl);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: var(--space-2);
      text-align: center;
    }
    .demo-logo span { color: var(--color-accent); }

    .demo-title {
      font-size: var(--font-size-xl);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-2);
    }
    .demo-subtitle {
      font-size: var(--font-size-md);
      color: var(--color-text-secondary);
      line-height: 1.6;
      margin-bottom: var(--space-6);
    }
    .demo-teach {
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      line-height: 1.6;
      margin-top: var(--space-6);
      padding: var(--space-4);
      background: var(--color-surface-alt);
      border-radius: var(--radius-md);
    }

    /* ── Concept Pane Forms ── */
    .demo-form-group { margin-bottom: var(--space-5); }
    .demo-label {
      display: block;
      font-size: var(--font-size-sm);
      font-weight: 600;
      margin-bottom: var(--space-2);
      color: var(--color-text-primary);
    }
    .demo-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 16px;
      font-family: inherit;
      color: var(--color-text-primary);
      background: var(--color-surface);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .demo-input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px var(--color-accent-light);
    }
    .demo-input::placeholder { color: var(--color-text-secondary); opacity: 0.5; }
    .demo-input-money { position: relative; }
    .demo-input-money::before {
      content: '$';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-secondary);
      font-size: 16px;
      font-weight: 500;
      pointer-events: none;
    }
    .demo-input-money .demo-input { padding-left: 28px; }

    /* ── Toggle Cards ── */
    .demo-toggle-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }
    .demo-toggle-card {
      padding: var(--space-4);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      text-align: center;
      cursor: pointer;
      transition: border-color var(--transition-fast), background var(--transition-fast);
      background: var(--color-surface);
    }
    .demo-toggle-card:hover { border-color: var(--color-accent-light); }
    .demo-toggle-card.is-selected {
      border-color: var(--color-accent);
      background: var(--color-accent-light);
    }
    .demo-toggle-card__title { font-size: var(--font-size-md); font-weight: 600; }
    .demo-toggle-card__sub { font-size: var(--font-size-xs); color: var(--color-text-secondary); margin-top: 2px; }

    /* ── Buttons ── */
    .demo-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-md);
      font-size: var(--font-size-md);
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: background var(--transition-fast), transform var(--transition-fast);
      text-decoration: none;
    }
    .demo-btn:active { transform: scale(0.97); }
    .demo-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .demo-btn--primary {
      background: var(--color-accent);
      color: var(--color-text-inverse);
      width: 100%;
      padding: var(--space-4) var(--space-6);
    }
    .demo-btn--primary:hover { background: var(--color-accent-dark); }
    .demo-btn--ghost {
      background: transparent;
      color: var(--color-accent);
      border: 1.5px solid var(--color-accent);
      width: 100%;
      padding: var(--space-4) var(--space-6);
    }
    .demo-btn--ghost:hover { background: var(--color-accent-light); }
    .demo-btn--link {
      background: none;
      color: var(--color-text-secondary);
      font-size: var(--font-size-sm);
      padding: var(--space-2);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Concept Pane Metric Tiles (Steps 1 & 3) ── */
    .demo-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }
    .demo-metric {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      text-align: center;
    }
    .demo-metric__label {
      font-size: var(--font-size-xs);
      color: var(--color-text-secondary);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: var(--space-1);
    }
    .demo-metric__value {
      font-size: var(--font-size-xl);
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .demo-metric__value--accent { color: var(--color-accent); }
    .demo-metric__value--danger { color: var(--color-danger); }
    .demo-metric__delta {
      font-size: var(--font-size-xs);
      font-weight: 600;
      color: var(--color-danger);
      margin-top: 2px;
    }
    @media (max-width: 400px) {
      .demo-metrics { grid-template-columns: 1fr; }
      .demo-metric { display: flex; justify-content: space-between; align-items: center; }
      .demo-metric__label { margin-bottom: 0; }
    }

    /* ── Meaning Screen ── */
    .demo-meaning { text-align: center; padding-top: var(--space-10); }
    .demo-meaning__title {
      font-size: var(--font-size-2xl);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: var(--space-5);
    }
    .demo-meaning__body {
      font-size: var(--font-size-lg);
      color: var(--color-text-secondary);
      line-height: 1.7;
      margin-bottom: var(--space-10);
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }
    .demo-meaning__ctas {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      max-width: 300px;
      margin: 0 auto;
    }

    /* ── Help Button ── */
    .demo-help-btn {
      position: fixed;
      bottom: var(--space-5);
      right: var(--space-5);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      box-shadow: var(--shadow-md);
      font-size: var(--font-size-lg);
      font-weight: 700;
      color: var(--color-accent);
      cursor: pointer;
      z-index: 50;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      display: none;
    }
    .demo-help-btn.is-visible { display: flex; align-items: center; justify-content: center; }
    .demo-help-btn:hover { transform: scale(1.08); box-shadow: var(--shadow-lg); }

    /* ── Help Panel ── */
    .demo-help-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.4);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-mid);
    }
    .demo-help-overlay.is-open { opacity: 1; pointer-events: auto; }
    .demo-help-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--color-surface);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: var(--space-5) var(--space-5) var(--space-8);
      z-index: 110;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      max-height: 70vh;
      overflow-y: auto;
    }
    .demo-help-panel.is-open { transform: translateY(0); }
    .demo-help-panel__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-5);
    }
    .demo-help-panel__title { font-size: var(--font-size-lg); font-weight: 700; }
    .demo-help-panel__close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--color-surface-alt);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-secondary);
    }
    .demo-help-card {
      background: var(--color-surface-alt);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
    }
    .demo-help-card__title { font-size: var(--font-size-md); font-weight: 600; margin-bottom: var(--space-1); }
    .demo-help-card__summary { font-size: var(--font-size-sm); color: var(--color-text-secondary); line-height: 1.5; }

    /* ── Nav Tour: shrink pane to focus on navigation bar ── */
    .demo-app-shell.nav-focus-mode {
      height: 160px;
    }
    .demo-app-shell.nav-focus-mode #main-content {
      display: none !important;
    }
    .demo-app-shell.nav-focus-mode .top-bar {
      opacity: 0.25;
    }
    .demo-app-shell.nav-focus-mode .bottom-nav {
      justify-content: center !important;
    }

    /* ── Nav Tour: bottom-nav item highlight ── */
    .demo-nav-highlight {
      position: relative;
      z-index: 2;
    }
    .demo-nav-highlight::after {
      content: '';
      position: absolute;
      inset: -3px -6px;
      border: 2px solid var(--color-accent);
      border-radius: 8px;
      animation: demo-pulse 1.5s ease-in-out 2;
      pointer-events: none;
    }

    /* ── Multi-stage highlight (stage 2, 3 reuse demo-highlight) ── */
    .demo-highlight-strong {
      outline: 2.5px solid var(--color-accent);
      outline-offset: 6px;
      border-radius: 8px;
      animation: demo-pulse 1.5s ease-in-out 3;
    }

    /* ── Sandbox Mode ── */
    .demo-app-shell.is-sandbox {
      pointer-events: auto;
      cursor: default;
    }
    .demo-sandbox-banner {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 30;
      background: var(--color-accent);
      color: var(--color-text-inverse);
      font-size: var(--font-size-xs);
      font-weight: 600;
      text-align: center;
      padding: 4px 0;
      letter-spacing: 0.03em;
    }
    .demo-app-shell.is-sandbox .top-bar {
      top: 24px;
    }
    .demo-app-shell.is-sandbox #main-content {
      top: calc(56px + 24px);
    }

    /* ── iOS mobile zoom prevention ── */
    @media (hover: none) and (pointer: coarse) {
      input, select, textarea { font-size: 16px !important; }
    }
  </style>
</head>
<body>

  <!-- Minimal demo header: logo + progress dots -->
  <header class="demo-header">
    <a href="/landing" class="demo-header__brand">Budget <span>Peace</span></a>
    <div class="demo-progress" id="demo-progress"></div>
  </header>

  <!-- Stage: concept pane (left) + app pane (right) -->
  <div class="demo-stage" id="demo-stage">

    <!-- Concept pane — demo-new.js writes teaching content here -->
    <div id="demo-concept"></div>

    <!-- App pane — real app shell elements, render functions write to #main-content -->
    <div id="demo-app" class="demo-app-shell is-hidden">
      <header class="top-bar">
        <button id="hamburger" class="top-bar__hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <a class="top-bar__brand" href="javascript:void(0)">Budget <span>Peace</span></a>
        <span id="page-title" class="top-bar__title">Home</span>
      </header>

      <div id="scenario-selector" class="scenario-selector is-hidden"></div>
      <div id="time-travel-strip" class="time-travel-strip is-hidden">
        <span class="time-travel-strip__label">Viewing as: <strong id="tt-date"></strong></span>
      </div>

      <main id="main-content" class="main-content"></main>

      <nav id="bottom-nav" class="bottom-nav">
        <button class="bottom-nav__item" data-page="home">Home</button>
        <button class="bottom-nav__item" data-page="pay-period">Period</button>
        <button class="bottom-nav__item" data-page="budgets">Budgets</button>
        <button class="bottom-nav__item" data-page="expenses">Expenses</button>
        <button class="bottom-nav__item" data-page="cards">Cards</button>
      </nav>

      <div id="speed-dial" class="speed-dial is-hidden"></div>
      <button id="fab" class="fab is-hidden" aria-label="Add">+</button>

      <!-- Invisible stubs for elements some code might query -->
      <div id="nav-overlay" style="display:none;"></div>
      <nav id="side-nav" style="display:none;"></nav>
    </div>
  </div>

  <!-- Help button (hidden until Step 1) -->
  <button class="demo-help-btn" id="demo-help-btn" aria-label="Review concepts">?</button>

  <!-- Help panel (hidden by default) -->
  <div class="demo-help-overlay" id="demo-help-overlay"></div>
  <div class="demo-help-panel" id="demo-help-panel"></div>

  <!-- Scripts: shim first, then real app modules, then demo engine -->
  <script src="/js/demo-shim.js"></script>
  <script src="/js/shared.js"></script>
  <script src="/js/pages/home.js"></script>
  <script src="/js/pages/expenses.js"></script>
  <script src="/js/pages/pay-period.js"></script>
  <script src="/js/pages/cards.js"></script>
  <script src="/js/pages/scenarios.js"></script>
  <script src="/js/pages/compare.js"></script>
  <script src="/js/demo-new.js"></script>
</body>
</html>
