<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Peace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

  <!-- Nav overlay -->
  <div id="nav-overlay" class="nav-overlay"></div>

  <!-- Side Nav (hamburger — secondary/future items) -->
  <nav id="side-nav" class="side-nav" aria-label="Main navigation">
    <div class="side-nav__header">
      <div class="side-nav__logo">Budget <span>Peace</span></div>
    </div>
    <div class="side-nav__links">
      <button class="side-nav__link" data-page="home">
        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 7.5L8 2.5l6 5V14H10.5V10h-5v4H2V7.5z"/></svg></span> Home
      </button>
      <button class="side-nav__link" data-page="pay-period">
        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="3.5" width="13" height="11" rx="1.5"/><path d="M5 2v3M11 2v3M1.5 7.5h13"/></svg></span> Pay Period
      </button>
      <button class="side-nav__link" data-page="budgets">
        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="8" width="3" height="6" rx="0.5"/><rect x="6.5" y="4.5" width="3" height="9.5" rx="0.5"/><rect x="11" y="2" width="3" height="12" rx="0.5"/></svg></span> Budgets
      </button>
      <button class="side-nav__link" data-page="expenses">
        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 5h8M4 8.5h8M4 12h5"/></svg></span> Expenses
      </button>
      <button class="side-nav__link" data-page="cards">
        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="4" width="13" height="9" rx="1.5"/><path d="M1.5 7.5h13"/></svg></span> Wallet
      </button>
    </div>
    <div class="side-nav__secondary">
      <div class="side-nav__section-label">Tools</div>
      <button class="side-nav__link" data-page="goals">
        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="8" r="6"/><circle cx="8" cy="8" r="3"/><circle cx="8" cy="8" r="0.75" fill="currentColor" stroke="none"/></svg></span> Goals
      </button>
      <button class="side-nav__link" data-page="compare">
        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="5" width="5" height="9" rx="0.75"/><rect x="9.5" y="2" width="5" height="12" rx="0.75"/></svg></span> Compare
      </button>
      <button class="side-nav__link" data-page="notes">
        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 2H3.5A1.5 1.5 0 002 3.5v9A1.5 1.5 0 003.5 14h9A1.5 1.5 0 0014 12.5V7L9 2z"/><path d="M9 2v4.5a.5.5 0 00.5.5H14"/><path d="M5.5 9.5h5M5.5 12h3.5"/></svg></span> Notes & Purchases
      </button>
      <button class="side-nav__link" data-page="scenarios">
        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1.5 6L8 2.5 14.5 6 8 9.5 1.5 6z"/><path d="M1.5 10l6.5 3.5 6.5-3.5"/></svg></span> Scenarios
      </button>
      <button class="side-nav__link" data-page="settings">
        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 4h1.5M6.5 4H14"/><circle cx="5" cy="4" r="1.5"/><path d="M2 8h6.5M11.5 8H14"/><circle cx="10" cy="8" r="1.5"/><path d="M2 12h3M8 12h6"/><circle cx="6.5" cy="12" r="1.5"/></svg></span> Settings
      </button>
    </div>
    <div class="side-nav__footer">
      <a class="side-nav__link side-nav__link--pro" id="upgrade-btn" href="/pro" style="display:none;text-decoration:none;">
        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2.5l1.6 3.3 3.6.5-2.6 2.5.6 3.6L8 10.7l-3.2 1.7.6-3.6L2.8 6.3l3.6-.5L8 2.5z"/></svg></span> Go Pro
      </a>
      <button class="side-nav__link" id="logout-btn" style="display:none;">
        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3H3.5A1.5 1.5 0 002 4.5v7A1.5 1.5 0 003.5 13H6"/><path d="M10.5 11L14 8l-3.5-3"/><path d="M6 8h8"/></svg></span> Sign Out
      </button>
    </div>
  </nav>

  <!-- Top Bar -->
  <header class="top-bar">
    <button id="hamburger" class="top-bar__hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <a id="brand" class="top-bar__brand" href="#home">Budget <span>Peace</span></a>
    <span id="page-title" class="top-bar__title">Home</span>
    <div id="tt-inline" class="top-bar__tt-inline">
      <button id="tt-inline-btn" class="top-bar__tt-inline-btn" aria-label="Time Travel"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="3.5" width="13" height="11" rx="1.5"/><path d="M5 2v3M11 2v3M1.5 7.5h13"/></svg> <span id="tt-inline-label">Today</span></button>
      <input type="date" id="tt-picker" style="position:absolute;right:0;top:100%;opacity:0;pointer-events:none;" />
    </div>
    <nav class="top-bar__nav" aria-label="Desktop navigation">
      <button class="top-bar__nav-item" data-page="home">Home</button>
      <button class="top-bar__nav-item" data-page="pay-period">Period</button>
      <button class="top-bar__nav-item" data-page="budgets">Budgets</button>
      <button class="top-bar__nav-item" data-page="expenses">Expenses</button>
      <button class="top-bar__nav-item" data-page="goals">Goals</button>
      <button class="top-bar__nav-item" data-page="cards">Wallet</button>
    </nav>
    <div class="top-bar__action">
      <button id="tt-open" class="top-bar__tt-btn" aria-label="Time Travel"><svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="3.5" width="13" height="11" rx="1.5"/><path d="M5 2v3M11 2v3M1.5 7.5h13"/></svg></button>
    </div>
    <button id="theme-toggle" class="top-bar__theme-toggle" aria-label="Toggle dark mode"></button>
    <button id="profile-avatar-btn" class="top-bar__avatar-btn" aria-label="Open profile"></button>
  </header>

  <!-- Mobile Time Travel Panel (hidden by default) -->
  <div id="tt-mobile-panel" class="tt-mobile-panel is-hidden">
    <label class="tt-mobile-panel__label" for="tt-mobile-input">Jump to date:</label>
    <input type="date" id="tt-mobile-input" class="tt-mobile-panel__input" />
    <button id="tt-mobile-cancel" class="tt-mobile-panel__cancel">Cancel</button>
  </div>

  <!-- Scenario Selector (hidden when only 1 scenario) -->
  <div id="scenario-selector" class="scenario-selector is-hidden"></div>

  <!-- Time Travel Strip (hidden by default) -->
  <div id="time-travel-strip" class="time-travel-strip is-hidden">
    <span class="time-travel-strip__label">Viewing as: <strong id="tt-date"></strong></span>
    <div class="time-travel-strip__actions">
      <button id="tt-change" class="time-travel-strip__btn">Change</button>
      <button id="tt-reset" class="time-travel-strip__btn">Back to Today</button>
    </div>
  </div>

  <!-- Main Content -->
  <main id="main-content" class="main-content"></main>

  <!-- Bottom Pill Nav -->
  <nav id="bottom-nav" class="bottom-nav" aria-label="Page navigation">
    <button class="bottom-nav__item" data-page="home">Home</button>
    <button class="bottom-nav__item" data-page="pay-period">Period</button>
    <button class="bottom-nav__item" data-page="budgets">Budgets</button>
    <button class="bottom-nav__item" data-page="expenses">Expenses</button>
    <button class="bottom-nav__item" data-page="cards">Wallet</button>
    <a class="bottom-nav__item bottom-nav__item--pro" href="/pro" id="bottom-nav-pro" style="display:none;text-decoration:none;">★ Pro</a>
  </nav>

  <!-- Speed Dial (reserved for future actions) -->
  <div id="speed-dial" class="speed-dial is-hidden"></div>

  <!-- FAB -->
  <button id="fab" class="fab is-hidden" aria-label="Add">+</button>

  <script src="/js/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/plans.js"></script>
  <script src="/js/profile.js"></script>
  <script src="/js/onboarding.js"></script>
  <script src="/js/auth-ui.js"></script>
  <script src="/js/shared.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/pages/home.js"></script>
  <script src="/js/pages/pay-period.js"></script>
  <script src="/js/pages/budgets.js"></script>
  <script src="/js/pages/expenses.js"></script>
  <script src="/js/pages/goals.js"></script>
  <script src="/js/pages/cards.js"></script>
  <script src="/js/pages/compare.js"></script>
  <script src="/js/pages/scenarios.js"></script>
  <script src="/js/pages/notes.js"></script>
  <script src="/js/pages/settings.js"></script>
  <script src="/js/demo.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
